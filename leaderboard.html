<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Mini Leaderboard</title>

    <style>
        body {
            background: #0f0f0f;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #ffd479;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        th {
            color: #ffd479;
        }

        tr:hover {
            background: #1a1a1a;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🏆 Rust Mini Leaderboard</h1>

    <table id="board">
        <thead>
        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>PvP Kills</th>
            <th>Deaths</th>
            <th>K/D</th>
            <th>NPC Kills</th>
            <th>Wood</th>
            <th>Stone</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
async function loadData() {
    // CHANGE THIS to your real URL:
    const url = "https://rustmini.github.io/rust-mini/RustMiniStats/export.json";

    const res = await fetch(url);
    const data = await res.json();

    let players = data.players;

    players.sort((a, b) => b.kills - a.kills);

    const tbody = document.querySelector("#board tbody");
    tbody.innerHTML = "";

    players.forEach((p, index) => {

        let kd = p.deaths === 0 ? p.kills : (p.kills / p.deaths).toFixed(2);

        let row = `
            <tr>
                <td>${index + 1}</td>
                <td>${p.name}</td>
                <td>${p.kills}</td>
                <td>${p.deaths}</td>
                <td>${kd}</td>
                <td>${p.npc}</td>
                <td>${p.wood}</td>
                <td>${p.stone}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });
}

loadData();
setInterval(loadData, 30000); // refresh every 30s
</script>

</body>
</html>
