<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Rust Mini | Monthly Wipe Server</title>

<style>
body{
    margin:0;
    background:#141414;
    color:#fff;
    font-family:Arial, sans-serif;
}

/* Banner */
.banner{
    width:100%;
    max-height:500px;
    object-fit:cover;
    display:block;
}

/* Layout */
.container{
    max-width:1000px;
    margin:0 auto;
    padding:20px;
}

/* Panels */
.panel{
    background:#1f1f1f;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    border:1px solid #2a2a2a;
}

/* Headings */
h1,h2,h3{
    margin:10px 0;
}

/* Button */
.button{
    background:#d96b27;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:6px;
    display:inline-block;
    margin-top:10px;
    font-weight:bold;
}

.button:hover{
    background:#ff7a2f;
}

/* Status text */
.status{
    font-size:18px;
}

/* Code style */
code{
    background:#000;
    padding:4px 6px;
    border-radius:4px;
}
</style>

</head>

<body>

<!-- Banner -->
<img src="banner.jpg" class="banner">

<div class="container">

<!-- Header -->
<div class="panel">
    <h1>RUST MINI</h1>
    <h3>Monthly Wipe Survival Server</h3>

    <p>Vanilla-style | Active Admins | Balanced Gameplay</p>

    <p><b>Connect:</b> <code>client.connect 123.45.67.89:28015</code></p>

    <a class="button" href="https://discord.gg/Cb8raFGg2t" target="_blank">
        Join Discord
    </a>
</div>

<!-- Player Count -->
<div class="panel">
    <h2>Server Status</h2>
    <div id="players" class="status">Loading players...</div>
</div>

<!-- Map -->
<div class="panel">
    <h2>Latest Map</h2>
    <img src="https://content.rustmaps.com/maps/285/9b13f7b6cbf74c449ff27f8cd5fa4162/thumbnail.webp" style="width:600px; height:600px; border-radius:8px;">
</div>

</div>

<!-- Player Script -->
<script>
const serverID = "38725790";

async function loadPlayers() {
    try {
        const res = await fetch(`https://api.battlemetrics.com/servers/${serverID}`);
        const data = await res.json();

        const players = data.data.attributes.players;
        const max = data.data.attributes.maxPlayers;

        document.getElementById("players").innerHTML =
            `🟢 ${players} / ${max} Players Online`;

    } catch (err) {
        document.getElementById("players").innerHTML =
            "⚠️ Unable to load player count";
    }
}

loadPlayers();
setInterval(loadPlayers, 30000);
</script>

</body>
</html>
