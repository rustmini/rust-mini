<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Rust-Mini | Monthly</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial, sans-serif;
}

/* Banner */
.banner{
    width:100%;
    max-height:500px;
    object-fit:cover;
    display:block;
}

/* Layout wrapper */
.container{
    max-width:1100px;
    margin:0 auto;
    padding:20px;
}

/* Sections (Rust-style panels) */
.panel{
    background:#222;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
}

/* Headings */
h1,h2,h3{
    margin:10px 0;
}

/* Discord button */
.button{
    background:#d96b27;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:6px;
    display:inline-block;
    margin-top:10px;
    font-weight:bold;
}

.button:hover{
    background:#ff7a2f;
}

/* Status text */
.status{
    font-size:18px;
}
</style>

</head>

<body>

<!-- Banner -->
<img src="banner.jpg" class="banner">

<!-- Main Info -->
<div class="header">
    <h1>RUST Mini | Monthly</h1>
    <h3>Designed for Workers</h3>

    <p> Vanilla-style | Active Non Player Admin | Monthly Full Wipes</p>

    <p><b>Connect:</b> 103.62.51.132:28105</p>

    <a class="button" href="https://discord.gg/Cb8raFGg2t" target="_blank">
        Join Discord
    </a>
</div>

<!-- Server Status -->
<h2>Server Status</h2>

<div id="players">Loading players...</div>

<script>
const serverID = "38725790";

async function loadPlayers() {
    try {
        const res = await fetch(`https://api.battlemetrics.com/servers/${serverID}`);
        const data = await res.json();

        const players = data.data.attributes.players;
        const max = data.data.attributes.maxPlayers;

        document.getElementById("players").innerHTML =
            `🟢 ${players} / ${max} Players Online`;

    } catch (err) {
        document.getElementById("players").innerHTML =
            "⚠️ Unable to load player count";
    }
}

loadPlayers();
setInterval(loadPlayers, 30000);
</script>

</body>

</html>
